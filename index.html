<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="هدية حب" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>هدية حب</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('romantic-site-theme-vars');
          if (!raw) return;
          var vars = JSON.parse(raw);
          var root = document.documentElement;
          for (var key in vars) {
            if (Object.prototype.hasOwnProperty.call(vars, key)) {
              root.style.setProperty(key, vars[key]);
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
